name: CI

on:
  push:
    branches: [main, develop, "release/**"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        # setup-uv는 메이저 별칭 태그(v8)를 제공하지 않으므로 정확한 버전으로 고정한다
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.21"
          enable-cache: true
          cache-dependency-glob: |
            .python-version
            pyproject.toml
            uv.lock
          # python-version 입력을 생략하면 uv가 저장소의 .python-version 파일을 사용한다.

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: make typecheck

      - name: Test
        run: make test

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: uv run python scripts/verify_release_version.py "${GITHUB_REF_NAME}"

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=rc,enable=${{ startsWith(github.ref, 'refs/heads/release/') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=boat-backend
          cache-to: type=gha,mode=max,scope=boat-backend
